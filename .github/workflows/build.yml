name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 33
          build-tools: '33.0.2'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk \
            autoconf automake autopoint libtool pkg-config \
            libffi-dev zlib1g-dev \
            libltdl-dev texinfo gettext
          # libtool.m4 already exists, skip

      - name: Install Python packages
        run: |
          pip install buildozer cython python-for-android

      - name: Accept SDK licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true

      - name: Build APK
        run: |
          export ACLOCAL_FLAGS="-I /usr/share/aclocal -I /usr/share/aclocal/libtool"
          export PKG_CONFIG_PATH="/usr/lib/pkgconfig:/usr/share/pkgconfig"
          buildozer android debug
        env:
          BUILDOZER_ANDROID_NDK_API: 21
          BUILDOZER_ANDROID_API: 33
          BUILDOZER_ANDROID_SDK_ROOT: $ANDROID_HOME
        timeout-minutes: 50

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: muyu-debug.apk
          path: bin/*.apk
